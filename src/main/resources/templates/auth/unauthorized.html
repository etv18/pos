<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Denied</title>

    <!-- Bootstrap -->
    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
    >

    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #121212;
        }

        .access-card {
            max-width: 500px;
            width: 100%;
            border-radius: 16px;
        }

        .lock-icon {
            font-size: 5rem;
        }
    </style>
</head>
<body>

<div class="card bg-dark text-light shadow-lg access-card border-secondary">
    <div class="card-body text-center p-5">

        <div class="mb-4 lock-icon">
            🔒
        </div>

        <h1 class="fw-bold mb-3">
            Access Denied
        </h1>

        <p class="text-secondary mb-4">
            Either you are not authorized to access this page or resource, or this resource does not exist.
        </p>

        <div class="d-flex justify-content-center gap-3">
            <button
                    class="btn btn-outline-light"
                    onclick="history.back()"
            >
                Go Back
            </button>
            <a th:href="@{/auth/login}" class="btn btn-primary">
                Login
            </a>
        </div>

    </div>
</div>

</body>
</html>
