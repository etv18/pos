<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" data-bs-theme="dark">
<head th:replace="~{fragments/components :: head}"></head>
<body>

<div th:replace="~{fragments/components :: headerNavBar}"></div>

<div class="d-flex justify-content-end mt-2 mx-2">
  <p class="fs-4 fw-bold">
    <i class="bi bi-person-square"></i>
    <span th:text="${username}"></span>
  </p>
</div>

<div class="modal fade" tabindex="-1" id="addProductModal">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Adding Product</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">

        <div class="form-floating mt-2">
          <input type="text" id="txtProdName" class="form-control"
                 placeholder="Name" required>
          <label for="txtProdName">Name</label>
        </div>

        <div class="d-flex gap-2">

          <div class="form-floating mt-2">
            <input type="text" id="txtStock" class="form-control"
                   placeholder="Amount" required>
            <label for="txtStock" >Price</label>
          </div>

          <div class="form-floating mt-2">
            <input type="text" id="txtProdPrice" class="form-control"
                   placeholder="Amount" value="0" required>
            <label for="txtProdPrice" >Stock</label>
          </div>

        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
        <button type="button" class="btn btn-primary">Save changes</button>
      </div>
    </div>
  </div>
</div>

<div class="container mt-2">
  <div class="control-panel">
    <button type="button"
            id="btnAddProduct"
            class="btn btn-outline-light"
            data-bs-toggle="modal"
            data-bs-target="#addProductModal"
    >
      Add a product <span><i class="bi bi-file-earmark-plus-fill"></i></span>
    </button>
  </div>
  <div class="table-responsive overflow-y-auto border rounded-2 mt-2" style="max-height: 600px;">
    <table class="table table-hover" id="tblInvoiceLines">
      <thead>
      <tr>
        <th scope="col">cod.</th>
        <th scope="col">name</th>
        <th scope="col">stock</th>
        <th scope="col">price</th>
        <th scope="col">Last Update</th>
        <th scope="col">Actions</th>
      </tr>
      </thead>
      <tbody>
      <tr th:each="p : ${products}">
        <td th:text="${p.code}"></td>
        <td th:text="${p.name}"></td>
        <td th:text="${p.price}"></td>
        <td th:text="${p.stock}"
            class="fw-bold"
            th:classappend="${p.stock < 10 ? 'text-danger' : 'text-success'}"
        ></td>
        <td th:text="${p.updatedAt}"></td>
        <td>
          <div class="d-flex gap-2">
            <a href="#" class="edit-user btn btn-outline-success"><i class="bi bi-pen"></i></a>
            <a href="#" class="edit-user btn btn-outline-danger"><i class="bi bi-trash"></i></a>
          </div>
        </td>
      </tr>
      </tbody>
    </table>
  </div>
</div>

<script type="module" th:src="@{/js/auth/logOut.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
