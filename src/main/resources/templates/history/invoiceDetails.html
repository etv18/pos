<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" data-bs-theme="dark">
<head th:replace="~{fragments/components :: head}"></head>
<body>
<div th:replace="~{fragments/components :: headerNavBar}"></div>

<div class="d-flex justify-content-end mt-2 mx-2">
  <p class="fs-4 fw-bold">
    <i class="bi bi-person-square"></i>
    <span th:text="${username}"></span>
  </p>
</div>

<div class="container">
  <div class="invoice-info fs-5">
    <div class="d-flex justify-content-center">
      <p class="fs-4 fw-bold">Invoice Details</p>
    </div>
    <p class="fw-bold">
      Code: <span class="fw-normal" th:text="${invoice.code}"></span>
    </p>

    <p class="fw-bold">
      Client: <span class="fw-normal" th:text="${invoice.clientName}"></span>
    </p>

    <p class="fw-bold">
      Total: <span class="fw-normal" th:text="${invoice.total}"></span>
    </p>

    <p class="fw-bold">
      Created at: <span class="fw-normal" th:text="${invoice.createdAt}"></span>
    </p>

  </div>

  <div class="table-responsive overflow-y-auto border rounded-2 mt-2" style="max-height: 600px;">
    <table class="table table-hover" id="tblInvoiceLines">
      <thead>
      <tr>
        <th scope="col">Code</th>
        <th scope="col">Name</th>
        <th scope="col">Unit Price</th>
        <th scope="col">Quantity</th>
        <th scope="col">Total</th>
      </tr>
      </thead>
      <tbody>
        <tr th:each="l : ${invoice.lines}">
          <td th:text="${l.product.code}"></td>
          <td th:text="${l.product.name}"></td>
          <td th:text="${l.product.price}"></td>
          <td th:text="${l.quantity}"></td>
          <td class="fw-bold fs-5" th:text="${l.total}"></td>
        </tr>
      </tbody>
    </table>
  </div>
  <div class="d-flex justify-content-end">
    <p class="fs-3 fw-bold" th:text="${invoice.total}"></p>
  </div>
</div>

<script type="module" th:src="@{/js/auth/logOut.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
