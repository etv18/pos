<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" data-bs-theme="dark">
<head th:replace="~{fragments/components :: head}"></head>
<body>

<div th:replace="~{fragments/components :: headerNavBar}"></div>

<div class="container mt-2">
    <div class="control-panel">
        <button type="button" id="btnCreateUser" class="btn btn-outline-light">
            New User <span><i class="bi bi-person-add"></i></span>
        </button>
    </div>
    <div class="table-responsive overflow-y-auto border rounded-2 mt-2" style="max-height: 600px;">
        <table class="table table-hover" id="tblInvoiceLines">
            <thead>
            <tr>
                <th scope="col">Full Name</th>
                <th scope="col">Username</th>
                <th scope="col">Roles</th>
                <th scope="col">Is Active</th>
                <th scope="col">Actions</th>
            </tr>
            </thead>
            <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.username}"></td>
                    <td th:text="${user.fullName}"></td>
                    <td>
                        <span th:each="role, iter : ${user.roles}">
                            <span th:text="${role}"></span>
                            <span th:if="${!iter.last}">, </span>
                        </span>
                    </td>
                    <td>
                        <div th:if="${user.isActive}">
                            <span class="badge rounded-pill text-bg-primary fs-5">
                                <i class="bi bi-person-check-fill fs-5"></i>
                            </span>
                        </div>
                        <div th:if="${!user.isActive}">
                            <span class="badge rounded-pill text-bg-danger fs-5">
                                <i class="bi bi-person-fill-slash"></i>
                            </span>
                        </div>
                    </td>
                    <td>
                        <div class="d-flex gap-2">
                            <a href="#" class="edit-user btn btn-outline-success"><i class="bi bi-pen"></i></a>
                            <a href="#" class="edit-user btn btn-outline-danger"><i class="bi bi-trash"></i></a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script type="module" th:src="@{/js/auth/logOut.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
