<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" data-bs-theme="dark">
<head th:replace="~{fragments/components :: head}"></head>
<body>

<div th:replace="~{fragments/components :: headerNavBar}"></div>

<div class="d-flex justify-content-end mt-2 mx-2">
    <p class="fs-4 fw-bold">
        <i class="bi bi-person-square"></i>
        <span th:text="${username}"></span>
    </p>
</div>

<div class="modal fade" tabindex="-1" id="createProductModal">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Create User</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="form-floating mt-2">
                    <input type="text" id="txtFullName" class="form-control"
                           placeholder="Full name" required>
                    <label for="txtFullName">Full name</label>
                </div>

                <div class="form-floating mt-2">
                    <input type="text" id="txtUsername" class="form-control"
                           placeholder="0" required>
                    <label for="txtUsername" >Stock</label>
                </div>

                <div class="form-floating mt-2">
                    <input type="text" id="txtPassword" class="form-control"
                           placeholder="0" required>
                    <label for="txtPassword">Password</label>
                </div>

                <div class="roles-group mt-2 d-flex gap-2">
                    <div th:each="role : ${roles}">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" th:value="${role}" th:id="${role}">
                            <label th:text="${role}" class="form-check-label"
                                   th:for="${role}"
                            >
                            </label>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary" id="btnSaveNewProduct">Create Product</button>
            </div>
        </div>
    </div>
</div>

<div class="container mt-2">
    <div class="control-panel">
        <button type="button"
                id="btnCreateUser"
                class="btn btn-outline-light"
                data-bs-toggle="modal"
                data-bs-target="#createProductModal"
        >
            New User <span><i class="bi bi-person-add"></i></span>
        </button>
    </div>
    <div class="table-responsive overflow-y-auto border rounded-2 mt-2" style="max-height: 600px;">
        <table class="table table-hover" id="tblInvoiceLines">
            <thead>
            <tr>
                <th scope="col">Full Name</th>
                <th scope="col">Username</th>
                <th scope="col">Roles</th>
                <th scope="col">Is Active</th>
                <th scope="col">Actions</th>
            </tr>
            </thead>
            <tbody>
                <tr th:each="user : ${users}">
                    <td th:text="${user.username}"></td>
                    <td th:text="${user.fullName}"></td>
                    <td>
                        <span th:each="role, iter : ${user.roles}">
                            <span th:text="${role}"></span>
                            <span th:if="${!iter.last}">, </span>
                        </span>
                    </td>
                    <td>
                        <div th:if="${user.isActive}">
                            <span class="badge rounded-pill text-bg-primary fs-5">
                                <i class="bi bi-person-check-fill fs-5"></i>
                            </span>
                        </div>
                        <div th:if="${!user.isActive}">
                            <span class="badge rounded-pill text-bg-danger fs-5">
                                <i class="bi bi-person-fill-slash"></i>
                            </span>
                        </div>
                    </td>
                    <td>
                        <div class="d-flex gap-2">
                            <button type="button"
                                    class="edit-user btn btn-outline-success"
                                    th:data-user-username="${user.username}"
                                    th:data-user-fullname="${user.fullName}"
                                    th:data-user-roles="${user.roles}"
                                    th:data-user-active="${user.isActive}"
                            >
                                <i class="bi bi-pen"></i>
                            </button>
                            <a href="#" class="edit-user btn btn-outline-danger"><i class="bi bi-trash"></i></a>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script type="module" th:src="@{/js/auth/logOut.js}"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

</body>
</html>
